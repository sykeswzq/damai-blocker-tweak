name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          persist-credentials: false

      - name: Fix line endings
        working-directory: Packages/com.damai.blocker
        run: |
          python3 -c "import pathlib; [pathlib.Path(p).write_bytes(pathlib.Path(p).read_bytes().replace(b'\r', b'')) for p in ['Makefile','Tweak.x','DamaiBlocker.plist']]"
          head -20 Makefile

      - name: Install Theos and tools
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          brew install ldid

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        env:
          THEOS: $HOME/theos
          THEOS_MAKE_PATH: $HOME/theos/makefiles
        run: |
          export THEOS=$HOME/theos
          export THEOS_MAKE_PATH=$HOME/theos/makefiles
          echo PWD=$PWD
          echo THEOS=$THEOS
          make clean && make package
          find packages/ -type f -name "*.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path:
            Packages/com.damai.blocker/packages/**/*.deb
          if-no-files-found: error
