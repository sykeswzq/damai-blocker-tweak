name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          persist-credentials: false

      - name: Fix line endings and debug
        working-directory: Packages/com.damai.blocker
        run: |
          python3 -c "import pathlib; [pathlib.Path(p).write_bytes(pathlib.Path(p).read_bytes().replace(b'', b'')) for p in ['Makefile','Tweak.x','DamaiBlocker.plist']]"
          echo "=== cat -A Makefile ==="
          cat -A Makefile
          echo "=== hexdump Makefile ==="
          xxd Makefile | head -40
          echo "=== Tweak.x CR count ==="
          python3 -c "print(open('Tweak.x','rb').read().count(b''))"

      - name: Install Theos and tools
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          brew install ldid
          ls $HOME/theos/bin/

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        env:
          THEOS: $HOME/theos
          THEOS_MAKE_PATH: $HOME/theos/makefiles
        run: |
          export THEOS=$HOME/theos
          export THEOS_MAKE_PATH=$HOME/theos/makefiles
          echo "=== Environment ==="
          echo PWD=$PWD
          echo THEOS=$THEOS
          echo THEOS_MAKE_PATH=$THEOS_MAKE_PATH
          echo "=== Check Makefile ==="
          cat -A Makefile
          xxd Makefile | head -40
          make clean && make package
          ls -la packages/ || echo "No packages dir!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path: Packages/com.damai.blocker/packages/*.deb
          if-no-files-found: error
