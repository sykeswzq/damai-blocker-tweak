name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Fix line endings and debug
        run: |
          python3 -c "import pathlib; [pathlib.Path(p).write_bytes(pathlib.Path(p).read_bytes().replace(b'\r\n', b'\n')) for p in ['Makefile','Tweak.x','.gitignore']]"
          cat -A Packages/com.damai.blocker/Makefile | head -15
          xxd Packages/com.damai.blocker/Makefile | head -40

      - name: Install Theos and tools
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          brew install ldid

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        env:
          THEOS: $HOME/theos
          THEOS_MAKE_PATH: $HOME/theos/makefiles
        run: |
          export THEOS=$HOME/theos
          export THEOS_MAKE_PATH=$HOME/theos/makefiles
          echo "PWD=$PWD"
          echo "THEOS=$THEOS"
          echo "THEOS_MAKE_PATH=$THEOS_MAKE_PATH"
          cat -A Makefile
          xxd Makefile | head -40
          make clean && make package
          ls -la packages/ || echo "NO packages dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path: Packages/com.damai.blocker/packages/*.deb
          if-no-files-found: error
