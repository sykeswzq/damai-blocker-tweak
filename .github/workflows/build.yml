name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        run: |
          export THEOS=$HOME/theos
          rm -rf "$THEOS"
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          brew install libarchive
          ls -la "$THEOS/bin/"

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        run: |
          export THEOS=$HOME/theos
          set -x
          echo "THEOS=$THEOS"
          ls -la "$THEOS"
          make clean && make package
          echo "--- packages/ ---"
          ls -la packages/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path: Packages/com.damai.blocker/packages/*.deb
          if-no-files-found: error
