name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          persist-credentials: false

      - name: Fix line endings
        working-directory: Packages/com.damai.blocker
        run: |
          python3 -c "import pathlib; [pathlib.Path(p).write_bytes(pathlib.Path(p).read_bytes().replace(b'\r', b'')) for p in ['Makefile','Tweak.x','DamaiBlocker.plist']]"
          python3 -c "print('CR counts:', open('Makefile','rb').read().count(b'\r'), open('Tweak.x','rb').read().count(b'\r'), open('DamaiBlocker.plist','rb').read().count(b'\r'))"
          head -20 Makefile
          xxd Makefile | head -15

      - name: Install Theos and tools
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          brew install ldid
          ls $HOME/theos/bin/

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        env:
          THEOS: $HOME/theos
          THEOS_MAKE_PATH: $HOME/theos/makefiles
        run: |
          export THEOS=$HOME/theos
          export THEOS_MAKE_PATH=$HOME/theos/makefiles
          echo "PWD=$PWD"
          echo "THEOS=$THEOS"
          head -20 Makefile
          xxd Makefile | head -15
          make clean && make package
          ls -la packages/ || echo "No packages dir!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path: Packages/com.damai.blocker/packages/*.deb
          if-no-files-found: error
