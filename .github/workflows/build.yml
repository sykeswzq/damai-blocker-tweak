name: Build DamaiBlocker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos and tools
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          brew install ldid
          ls $HOME/theos/bin/ | head

      - name: Build deb
        working-directory: Packages/com.damai.blocker
        env:
          THEOS: $HOME/theos
        run: |
          export THEOS=$HOME/theos
          make clean && make package
          ls -la packages/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamaiBlocker.deb
          path: Packages/com.damai.blocker/packages/*.deb
          if-no-files-found: error
